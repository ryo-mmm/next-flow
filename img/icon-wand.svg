<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Wand stick: thick diagonal, bottom-left to center -->
  <line x1="3" y1="21" x2="12.5" y2="11.5"
        stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 4-pointed star, center (17, 7), outer r=3.5, inner r=1.4
       outer: top(17,3.5) right(20.5,7) bottom(17,10.5) left(13.5,7)
       inner: (17+0.99,7-0.99)=(17.99,6.01)→(18,6) etc. -->
  <path d="M17 3.5 L18 6 L20.5 7 L18 8 L17 10.5 L16 8 L13.5 7 L16 6 Z"
        fill="rgba(0,122,255,0.12)" stroke="#007AFF" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Small sparkle, center (9,5), outer r=1.8, inner r=0.72
       outer: (9,3.2)(10.8,5)(9,6.8)(7.2,5)
       inner: (9.51,4.49)(9.51,5.51)(8.49,5.51)(8.49,4.49) -->
  <path d="M9 3.2 L9.5 4.5 L10.8 5 L9.5 5.5 L9 6.8 L8.5 5.5 L7.2 5 L8.5 4.5 Z"
        fill="rgba(0,122,255,0.12)" stroke="#007AFF" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Accent dot -->
  <circle cx="20.5" cy="13.5" r="1" fill="#007AFF"/>
</svg>
