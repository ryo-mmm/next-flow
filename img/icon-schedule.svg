<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Calendar body: symmetric (3,4) to (21,21), rx=2.5 -->
  <rect x="3" y="4" width="18" height="17" rx="2.5"
        stroke="#7B5EA7" stroke-width="1.75"/>

  <!-- Binding pins: centered at x=8 and x=16 -->
  <line x1="8"  y1="2" x2="8"  y2="6" stroke="#7B5EA7" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="16" y1="2" x2="16" y2="6" stroke="#7B5EA7" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Header divider -->
  <line x1="3" y1="10" x2="21" y2="10" stroke="#7B5EA7" stroke-width="1.5"/>

  <!-- Task rows: 2 rows of short pill-bars -->
  <!-- Row 1 (y=14): filled bar (long = current task) -->
  <rect x="7" y="12.5" width="10" height="3" rx="1.5"
        fill="rgba(123,94,167,0.18)" stroke="#7B5EA7" stroke-width="1.25"/>
  <!-- Row 2 (y=18): filled bar (shorter = next task) -->
  <rect x="7" y="16.5" width="7"  height="3" rx="1.5"
        fill="rgba(123,94,167,0.12)" stroke="#7B5EA7" stroke-width="1.25"/>

  <!-- Circular refresh arrow (optimization), top-right overlay
       Circle center: (20,5), radius 2.5
       Arc: start top (20,2.5) → end left (17.5,5), clockwise 3/4
       large-arc=1, sweep=1 -->
  <path d="M20 2.5 A2.5 2.5 0 1 1 17.5 5"
        stroke="#7B5EA7" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Arrowhead at arc end (17.5,5), tangent points downward → head: ↓ -->
  <polyline points="16,5 17.5,5 17.5,3.5"
            stroke="#7B5EA7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
