<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Bell body:
       Symmetric about x=12. Shoulder at x=4/20 (y=18), peak at (12,4).
       Path: start at clapper-left, arc up to peak, arc down to right shoulder, shelf line across -->
  <path d="M4 19 C4 19 5 17 5 12 A7 7 0 0 1 19 12 C19 17 20 19 20 19 Z"
        stroke="#0AB5A8" stroke-width="1.75" stroke-linejoin="round" fill="none"/>

  <!-- Shelf cap (horizontal line at bell top opening) -->
  <line x1="2.5" y1="19" x2="21.5" y2="19"
        stroke="#0AB5A8" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Clapper (bottom center arc) -->
  <path d="M10 19 A2 2 0 0 0 14 19"
        stroke="#0AB5A8" stroke-width="1.75" stroke-linecap="round" fill="none"/>

  <!-- Notification dot: solid filled circle, top-right of bell -->
  <circle cx="17.5" cy="5.5" r="2.8"
          fill="#0AB5A8" stroke="#F8F9FA" stroke-width="1.5"/>
</svg>
